server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /aforo {
        proxy_pass http://gateway:8080;
    }
    location /eventos {
        proxy_pass http://gateway:8080;
    }
    location /reportes {
        proxy_pass http://gateway:8080;
    }
    location /usuarios {
        proxy_pass http://gateway:8080;
    }
}
