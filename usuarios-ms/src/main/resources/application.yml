server:
  port: 8084

spring:
  application:
    name: usuarios-ms
  datasource:
    url: jdbc:h2:mem:usuariosdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: "coliseo-secret-key-must-be-at-least-256-bits-long-for-hs256"
  expiration-ms: 86400000  

springdoc:
  swagger-ui:
    path: /swagger-ui.html
