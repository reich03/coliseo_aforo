server:
  port: 8081

spring:
  application:
    name: aforo-ms

  datasource:
    url: jdbc:h2:mem:aforodb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

aforo:
  umbral-alerta: 70
  umbral-lleno: 90

management:
  endpoints:
    web:
      exposure:
        include: health, info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
