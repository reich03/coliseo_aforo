server:
  port: 8083

spring:
  application:
    name: reportes-ms
  datasource:
    url: jdbc:h2:mem:reportesdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html
